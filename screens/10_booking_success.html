<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyGate — Booking Successful</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="../favicon.svg" />
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/phone.css" />
  <link rel="stylesheet" href="../assets/css/mygate.css" />
  <style>
    .success {
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .success__head {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .success__check {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #5fb871;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .success__check svg { width: 26px; height: 26px; }
    .success__title {
      font-size: 30px;
      font-weight: 600;
      color: #74c285;
      line-height: 1.1;
    }
    .success__sub {
      font-size: 19px;
      color: #4a4a4a;
    }
    .success__notes-label {
      font-size: 16px;
      color: #5a5a5a;
      margin-top: 4px;
    }
    .success__note {
      display: flex;
      gap: 8px;
      font-size: 16px;
      color: #6a6a6a;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <a class="launcher-back" href="../index.html">← All screens</a>
  <div class="stage">
    <div class="phone">
      <div class="phone__screen">
        <div class="statusbar">
          <span class="statusbar__time">12:44</span>
          <span class="statusbar__icons">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7l10 10-5 5V2l5 5L7 17"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 20h3v-6H2v6zm5 0h3V9H7v11zm5 0h3V4h-3v16zm5 0h3v-9h-3v9z"/></svg>
            <svg viewBox="0 0 26 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="7" width="18" height="10" rx="2.5"/><rect x="4" y="9" width="12" height="6" rx="1" fill="currentColor"/><path d="M22 10.5v3"/></svg>
            <span class="statusbar__batt">92%</span>
          </span>
        </div>

        <div class="appbar" data-nav="02_home.html">
          <svg class="appbar__back" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span class="appbar__title">Booking Status</span>
        </div>

        <div class="app">
          <div class="success">
            <div class="success__head">
              <span class="success__check">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
              </span>
              <span class="success__title">Booking<br />Successful</span>
            </div>
            <div class="success__sub">Your booking has been confirmed.</div>
            <div class="success__notes-label">Notes:</div>
            <div class="success__note"><span>1.</span><span>You are allowed to cancel the booking until 1 hours hours before the booking start time</span></div>
          </div>
        </div>

        <div class="phone__home-indicator"></div>
      </div>
    </div>
  </div>
  <script src="../assets/js/pwa.js"></script>
  <script src="../assets/js/nav.js"></script>
</body>
</html>
