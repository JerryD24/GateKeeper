<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyGate — Quick Actions</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="../assets/img/logo.png" />
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/phone.css" />
  <link rel="stylesheet" href="../assets/css/mygate.css" />
  <style>
    .qa-search {
      margin: 14px 18px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 15px 18px;
      border-radius: 14px;
      background: #f0f1f3;
    }
    .qa-search svg { width: 20px; height: 20px; color: #8a8a8a; }
    .qa-search span { color: #9a9a9a; font-size: 16px; }

    .qa-sec {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 20px 16px;
    }
    .qa-sec__title { font-size: 21px; font-weight: 700; color: #1f1f1f; }
    .qa-sec__link { color: #2b7de9; font-weight: 600; font-size: 15px; display:inline-flex; align-items:center; gap:3px; }
    .qa-sec__link svg { width: 15px; height: 15px; }
    .qa-alert {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border: 1px solid #e0b6b6; border-radius: 999px;
      color: #d93636; font-weight: 700; font-size: 15px;
    }
    .qa-alert svg { width: 16px; height: 16px; }

    .qa-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px 10px;
      padding: 0 16px 26px;
    }
    .qa-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .qa-tile {
      width: 62px; height: 62px;
      border: 1px solid #e6e6e6;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
    }
    .qa-tile svg { width: 30px; height: 30px; color: #222; }
    .qa-label { font-size: 12px; color: #444; text-align: center; line-height: 1.25; }
  </style>
</head>
<body>
  <a class="launcher-back" href="../index.html">← All screens</a>
  <div class="stage">
    <div class="phone">
      <div class="phone__screen" style="background:#fff;">
        <div class="appbar appbar--center">
          <svg class="appbar__close" data-nav="02_home.html" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          <span class="appbar__title">Quick Actions</span>
        </div>

        <div class="app">
          <div class="qa-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <span>Search all features</span>
          </div>

          <div class="qa-sec">
            <span class="qa-sec__title">Visitors &amp; Security</span>
            <span class="qa-alert"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>Raise Alert</span>
          </div>

          <div class="qa-grid">
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3-6 7-6s7 2 7 6"/></svg></div><span class="qa-label">Invite Guest</span></div>
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 16l1.5-5A2 2 0 018.4 9.6h7.2a2 2 0 011.9 1.4L19 16M5 16h14M5 16v3M19 16v3"/><circle cx="7.5" cy="16.5" r="1"/><circle cx="16.5" cy="16.5" r="1"/></svg></div><span class="qa-label">Cab/Auto</span></div>
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="6" cy="18" r="2"/><circle cx="17" cy="18" r="2"/><path d="M8 18h7M2 8h6l3 8M14 10h4l2 4v4"/></svg></div><span class="qa-label">Allow Delivery</span></div>
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M14 7l3-3 3 3-3 3M4 20l6-6M14 7l-9 9-1 4 4-1 9-9"/></svg></div><span class="qa-label">Visiting Help</span></div>

            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 4h4l2 5-3 2a12 12 0 006 6l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/></svg></div><span class="qa-label">Call Security</span></div>
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></div><span class="qa-label">Message Guard</span></div>
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="8" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="16" cy="12" r="1"/></svg></div><span class="qa-label">MyPasses</span></div>
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="11" r="1"/><circle cx="15" cy="11" r="1"/><path d="M9 15c1 1 5 1 6 0"/></svg></div><span class="qa-label">Allow Kid Exit</span></div>
          </div>

          <div class="qa-sec">
            <span class="qa-sec__title">Community</span>
            <span class="qa-sec__link">View all <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
          </div>

          <div class="qa-grid">
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="5" y="3" width="14" height="18" rx="2"/><circle cx="12" cy="9" r="2.5"/><path d="M8 16c1-2 7-2 8 0"/></svg></div><span class="qa-label">Residents</span></div>
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 15l1.3-4A2 2 0 018.2 9.6h5.6M4 15h10M4 15v2M14 15v2"/><circle cx="6.5" cy="15.5" r="1"/><circle cx="11.5" cy="15.5" r="1"/><circle cx="17" cy="10" r="4"/><path d="M17 8v2M17 12h.01"/></svg></div><span class="qa-label">Search Vehicle</span></div>
            <div class="qa-item"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="7" r="3"/><path d="M6 21c0-4 3-6 6-6s6 2 6 6"/></svg></div><span class="qa-label">Find Daily Help</span></div>
            <div class="qa-item" data-nav="04_amenities.html"><div class="qa-tile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="8" cy="8" r="5"/><path d="M11.5 11.5L20 20M4 4l2 2"/></svg></div><span class="qa-label">Amenities</span></div>
          </div>

          <div class="qa-sec">
            <span class="qa-sec__title">Feed</span>
            <span class="qa-sec__link">View all posts <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 16px 20px;">
            <div style="height:34px;border:1px solid #eee;border-radius:10px;"></div>
            <div style="height:34px;border:1px solid #eee;border-radius:10px;"></div>
            <div style="height:34px;border:1px solid #eee;border-radius:10px;"></div>
            <div style="height:34px;border:1px solid #eee;border-radius:10px;"></div>
          </div>
        </div>

        <div class="phone__home-indicator" style="background:#000;"></div>
      </div>
    </div>
  </div>
  <script src="../assets/js/pwa.js"></script>
  <script src="../assets/js/nav.js"></script>
</body>
</html>
