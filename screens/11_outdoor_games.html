<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MyGate — Select Amenity</title>
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/phone.css" />
  <link rel="stylesheet" href="../assets/css/mygate.css" />
  <style>
    .search {
      margin: 18px 18px 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border: 1px solid #d9d9d9;
      border-radius: 999px;
    }
    .search input {
      border: none; outline: none; flex: 1;
      font-size: 16px; color: #444; background: transparent;
    }
    .search input::placeholder { color: #9a9a9a; }
    .search svg { width: 20px; height: 20px; color: #7a7a7a; }
    .amenity-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 20px;
      border-bottom: 1px solid #eee;
    }
    .amenity-row__name {
      font-size: 19px; color: #5a5a5a; line-height: 1.3; max-width: 62%;
    }
    .amenity-row__right {
      display: flex; align-items: center; gap: 4px;
      color: #8a8a8a; font-size: 16px; white-space: nowrap;
    }
    .amenity-row__right svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <a class="launcher-back" href="../index.html">← All screens</a>
  <div class="stage">
    <div class="phone">
      <div class="phone__screen" style="background:#fff;">
        <div class="appbar" data-nav="05_choose_location.html">
          <svg class="appbar__back" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span class="appbar__title">Select Amenity</span>
        </div>

        <div class="app">
          <div class="search">
            <input type="text" placeholder="Enter Amenity Name" />
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          </div>

          <div class="amenity-row" data-nav="07_gym_date.html?amenity=BasketBall%20and%20Tennis%20Court">
            <span class="amenity-row__name">BasketBall and Tennis Court</span>
            <span class="amenity-row__right">Free <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
          </div>
          <div class="amenity-row" data-nav="07_gym_date.html?amenity=Cricket%20Practice%20Nets">
            <span class="amenity-row__name">Cricket Practice Nets</span>
            <span class="amenity-row__right">Free <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
          </div>
          <div class="amenity-row" data-nav="07_gym_date.html?amenity=Football%20Turf">
            <span class="amenity-row__name">Football Turf</span>
            <span class="amenity-row__right">Free <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
          </div>
        </div>

        <div class="phone__home-indicator"></div>
      </div>
    </div>
  </div>
  <script src="../assets/js/pwa.js"></script>
  <script src="../assets/js/nav.js"></script>
</body>
</html>
