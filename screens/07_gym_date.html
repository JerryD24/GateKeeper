<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MyGate — Gym · Select a Date</title>
  <link rel="manifest" href="../manifest.webmanifest" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/phone.css" />
  <link rel="stylesheet" href="../assets/css/mygate.css" />
  <link rel="stylesheet" href="../assets/css/gym-date.css" />
</head>
<body>
  <a class="launcher-back" href="../index.html">← All screens</a>
  <div class="stage">
    <div class="phone">
      <div class="phone__screen" style="background:#fff;">
        <div class="statusbar">
          <span class="statusbar__time">12:44</span>
          <span class="statusbar__icons">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 7l10 10-5 5V2l5 5L7 17"/></svg>
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 20h3v-6H2v6zm5 0h3V9H7v11zm5 0h3V4h-3v16zm5 0h3v-9h-3v9z"/></svg>
            <svg viewBox="0 0 26 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="7" width="18" height="10" rx="2.5"/><rect x="4" y="9" width="12" height="6" rx="1" fill="currentColor"/><path d="M22 10.5v3"/></svg>
            <span class="statusbar__batt">92%</span>
          </span>
        </div>

        <div class="appbar" data-nav="06_select_amenity.html">
          <svg class="appbar__back" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span class="appbar__title">Gym</span>
          <span class="pill-free">Free</span>
        </div>

        <div class="app">
          <div class="gym-desc">
            <div class="gym-desc__muted">Description &amp; Additional Details</div>
            <div class="gym-desc__label">Schedule:</div>
            <div class="gym-desc__line">* Sunday: 6:00 AM to 11:00 AM (First Half</div>
            <div class="link gym-desc__more">Read More <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></div>
          </div>

          <div class="gym-divider"></div>

          <div class="cal-top">
            <span class="cal-top__title">Select a Date</span>
            <span class="link cal-top__link">See Booked Slots <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></span>
          </div>

          <div class="cal-month" id="calMonth">&nbsp;</div>

          <div class="cal-weekdays">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
          </div>

          <div class="cal-grid" id="calGrid"></div>

          <p class="cal-hint">Only today &amp; tomorrow are available for booking.</p>
        </div>

        <div class="bottombar">
          <div class="btn-disabled" id="selectTimeslotBtn">Select Timeslot</div>
        </div>

        <div class="phone__home-indicator"></div>
      </div>
    </div>
  </div>
  <script src="../assets/js/pwa.js"></script>
  <script src="../assets/js/nav.js"></script>
  <script src="../assets/js/gym.js"></script>
</body>
</html>
