<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyGate — Launch</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/reset.css" />
  <link rel="stylesheet" href="../assets/css/phone.css" />
  <style>
    .launch {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background:
        radial-gradient(120% 90% at 50% 40%, #2b2b2e 0%, #201f22 60%, #161517 100%);
      cursor: pointer;
    }
    .launch__icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      background: linear-gradient(135deg, #a9d4ef 0%, #cfd8e0 40%, #f4c33a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 30px -10px rgba(0, 0, 0, 0.6);
    }
    .launch__icon svg { width: 58px; height: 58px; }
    .launch__label {
      color: #f2f2f2;
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <a class="launcher-back" href="../index.html">← All screens</a>
  <div class="stage">
    <div class="phone">
      <div class="phone__screen" style="background:#161517;">
        <div class="launch" data-nav="02_home.html">
          <div class="launch__icon">
            <svg viewBox="0 0 100 100" fill="#111">
              <rect x="14" y="30" width="16" height="16" rx="3"/>
              <rect x="34" y="30" width="16" height="16" rx="3"/>
              <rect x="14" y="50" width="16" height="26" rx="3"/>
              <rect x="34" y="50" width="16" height="16" rx="3"/>
              <rect x="54" y="30" width="30" height="16" rx="3"/>
              <rect x="54" y="50" width="16" height="26" rx="3"/>
              <rect x="74" y="50" width="10" height="10" rx="3"/>
            </svg>
          </div>
          <div class="launch__label">mygate</div>
        </div>
        <div class="phone__home-indicator" style="--x:0;"></div>
      </div>
    </div>
  </div>
  <script src="../assets/js/nav.js"></script>
</body>
</html>
