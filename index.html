<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>mygate — Screens</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#efe9df" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="mygate" />
  <link rel="apple-touch-icon" href="assets/img/logo.png" />
  <link rel="icon" href="assets/img/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/reset.css" />
  <style>
    body {
      background:
        radial-gradient(1200px 700px at 50% -10%, #24304f 0%, #141c30 55%, #0c111d 100%);
      color: #fff;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 24px 80px;
    }

    .head {
      text-align: center;
      margin-bottom: 48px;
    }

    .head__badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(242, 103, 34, 0.15);
      border: 1px solid rgba(242, 103, 34, 0.4);
      color: #ffb489;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .head h1 {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .head p {
      color: #9aa3b2;
      font-size: 16px;
      max-width: 560px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 28px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      text-align: center;
      transition: transform 0.18s ease;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card__frame {
      aspect-ratio: 390 / 844;
      border-radius: 26px;
      background: #0b0d12;
      padding: 8px;
      box-shadow: 0 20px 44px -18px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      position: relative;
    }

    .card__preview {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      border: 0;
      pointer-events: none;
      background: #f4f5f7;
      transform: scale(1);
    }

    .card__empty {
      width: 100%;
      height: 100%;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 13px;
      background: repeating-linear-gradient(45deg, #1a1f2b, #1a1f2b 12px, #161b26 12px, #161b26 24px);
    }

    .card__label {
      font-size: 14px;
      font-weight: 600;
      color: #e7eaf0;
    }

    .card__num {
      color: #6b7280;
      font-weight: 700;
      margin-right: 6px;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      color: #9aa3b2;
    }

    .install-btn {
      margin-top: 22px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 26px;
      border-radius: 999px;
      background: #f7d000;
      color: #1a1a1a;
      font-size: 15px;
      font-weight: 700;
      box-shadow: 0 10px 24px -10px rgba(247, 208, 0, 0.7);
    }
    .install-btn:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="head">
      <span class="head__badge">● mygate</span>
      <h1>mygate — Amenity Booking Flow</h1>
      <p>Pixel-accurate recreations of the app, each rendered inside a phone frame. Tap Home and walk the whole booking flow, or open any screen directly.</p>
      <button class="install-btn" id="installBtn" style="display:none;">⬇ Install mygate</button>
    </header>

    <main class="grid" id="grid"></main>
  </div>

  <script>
    // Register each screen here in sequence as it's built.
    const SCREENS = [
      { file: 'screens/02_home.html', label: 'Home' },
      { file: 'screens/03_quick_actions.html', label: 'Quick Actions' },
      { file: 'screens/04_amenities.html', label: 'Amenities · My Bookings' },
      { file: 'screens/05_choose_location.html', label: 'Choose Location' },
      { file: 'screens/06_select_amenity.html', label: 'Health & Fitness · Amenities' },
      { file: 'screens/11_outdoor_games.html', label: 'Outdoor Games · Amenities' },
      { file: 'screens/12_indoor_games.html', label: 'Indoor Games · Amenities' },
      { file: 'screens/07_gym_date.html', label: 'Select a Date' },
      { file: 'screens/09_gym_timeslots.html', label: 'Timeslots' },
      { file: 'screens/10_booking_success.html', label: 'Booking Successful' },
      { file: 'screens/13_settings.html', label: 'Settings · Profile' },
    ];

    const grid = document.getElementById('grid');

    if (SCREENS.length === 0) {
      grid.innerHTML =
        '<div class="empty-state">No screens yet. Send the first screenshot and it\'ll appear here.</div>';
    } else {
      SCREENS.forEach((s, i) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = s.file;
        a.innerHTML = `
          <div class="card__frame">
            <iframe class="card__preview" src="${s.file}" loading="lazy" scrolling="no"></iframe>
          </div>
          <div class="card__label"><span class="card__num">${String(i + 1).padStart(2, '0')}</span>${s.label}</div>
        `;
        grid.appendChild(a);
      });
    }
  </script>
  <script src="assets/js/pwa.js"></script>
</body>
</html>
